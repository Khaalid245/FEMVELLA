name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest develop SHA)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: femvelle_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -r backend/requirements/test.txt

      - name: Backend tests
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/femvelle_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
        run: |
          cd backend
          python manage.py test --settings=config.settings.test --skip-checks

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        run: |
          cd frontend
          npm ci
          npm run test:run

  # ── 2. Build & push staging images ────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          if [ -z "$TAG" ]; then
            TAG="develop-$(echo ${{ github.sha }} | cut -c1-8)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to staging ───────────────────────────────────────────────────
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/femvelle-staging

            # Pull new images
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            export REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker compose -f docker-compose.staging.yml pull

            # Migrate
            docker compose -f docker-compose.staging.yml run --rm django \
              python manage.py migrate --settings=config.settings.staging

            # Collect static
            docker compose -f docker-compose.staging.yml run --rm django \
              python manage.py collectstatic --noinput --settings=config.settings.staging

            # Rolling restart (no downtime)
            docker compose -f docker-compose.staging.yml up -d --remove-orphans

            # Prune old images
            docker image prune -f

      # ── 4. Smoke tests ─────────────────────────────────────────────────────
      - name: Smoke tests
        run: |
          sleep 20
          curl -f https://staging.femvelle.com/ || exit 1
          curl -f https://api.staging.femvelle.com/health/ || exit 1
          curl -f https://api.staging.femvelle.com/api/products/ || exit 1
          echo "✅ All smoke tests passed"

      # ── 5. Notify Sentry ───────────────────────────────────────────────────
      - name: Notify Sentry
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: femvelle
        with:
          environment: staging
          version: ${{ needs.build.outputs.image_tag }}

      # ── 6. Slack notification ──────────────────────────────────────────────
      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Staging deployed* — `${{ needs.build.outputs.image_tag }}`\n<https://staging.femvelle.com|View Staging> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *Staging deploy FAILED* — `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
