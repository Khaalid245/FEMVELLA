name: Deploy Production (Blue/Green)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: femvelle_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -r backend/requirements/test.txt
      - name: Backend tests
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/femvelle_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
        run: cd backend && python manage.py test --settings=config.settings.test --skip-checks
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npm run test:run

  # ── 2. Security scan ───────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-results.sarif }

  # ── 3. Build & push images ─────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=main-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Blue/Green deploy ───────────────────────────────────────────────────
  deploy:
    name: Blue/Green Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Blue/Green deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/femvelle

            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
            echo "Deploying image tag: $IMAGE_TAG"

            # ── Determine current slot (blue or green) ──────────────────────
            CURRENT=$(cat /opt/femvelle/.current_slot 2>/dev/null || echo "blue")
            if [ "$CURRENT" = "blue" ]; then
              NEW_SLOT="green"
              NEW_PORT="8001"
              OLD_PORT="8000"
            else
              NEW_SLOT="blue"
              NEW_PORT="8000"
              OLD_PORT="8001"
            fi
            echo "Current: $CURRENT → Deploying to: $NEW_SLOT (port $NEW_PORT)"

            # ── Start new slot ──────────────────────────────────────────────
            export IMAGE_TAG=$IMAGE_TAG
            export SLOT=$NEW_SLOT
            export APP_PORT=$NEW_PORT

            docker compose -f docker-compose.prod.yml \
              -p femvelle_$NEW_SLOT \
              up -d django celery celery-beat

            # ── Run migrations on new slot ──────────────────────────────────
            docker compose -f docker-compose.prod.yml \
              -p femvelle_$NEW_SLOT \
              run --rm django python manage.py migrate

            # ── Health check new slot ───────────────────────────────────────
            echo "Health checking new slot on port $NEW_PORT..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:$NEW_PORT/health/ > /dev/null; then
                echo "✅ New slot healthy after ${i}x5s"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ New slot failed health check — aborting, keeping $CURRENT"
                docker compose -f docker-compose.prod.yml -p femvelle_$NEW_SLOT down
                exit 1
              fi
              sleep 5
            done

            # ── Cut over nginx to new slot ──────────────────────────────────
            sed -i "s/proxy_pass http:\/\/django:$OLD_PORT/proxy_pass http:\/\/django:$NEW_PORT/" \
              /opt/femvelle/nginx/sites-enabled/femvelle.conf
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
            echo "✅ Nginx cut over to $NEW_SLOT"

            # ── Record new active slot ──────────────────────────────────────
            echo "$NEW_SLOT" > /opt/femvelle/.current_slot

            # ── Drain and stop old slot (keep for 60s for in-flight requests) ─
            sleep 60
            docker compose -f docker-compose.prod.yml \
              -p femvelle_$CURRENT \
              stop django celery celery-beat
            echo "✅ Old slot $CURRENT stopped (kept for rollback)"

            # ── Prune old images ────────────────────────────────────────────
            docker image prune -f

      # ── 5. Post-deploy health check ────────────────────────────────────────
      - name: Production health check
        run: |
          sleep 15
          curl -f https://femvelle.com/ || exit 1
          curl -f https://api.femvelle.com/health/ || exit 1
          curl -f https://api.femvelle.com/api/products/ || exit 1
          echo "✅ Production health checks passed"

      # ── 6. Sentry release ─────────────────────────────────────────────────
      - name: Notify Sentry
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: femvelle
        with:
          environment: production
          version: ${{ needs.build.outputs.image_tag }}

      # ── 7. Slack success ───────────────────────────────────────────────────
      - name: Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Production deployed* (blue/green) — `${{ needs.build.outputs.image_tag }}`\n<https://femvelle.com|View Site> | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── 8. Slack failure + trigger rollback ───────────────────────────────
      - name: Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *Production deploy FAILED* — `${{ github.sha }}`\nPrevious slot still active. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── 9. Post-deploy backup ──────────────────────────────────────────────
      - name: Trigger backup
        if: success()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/femvelle
            docker compose -f docker-compose.prod.yml run --rm backup /backup.sh

  # ── 5. Manual rollback (workflow_dispatch only) ────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    environment: production
    steps:
      - name: Rollback to previous slot
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/femvelle
            CURRENT=$(cat /opt/femvelle/.current_slot)
            if [ "$CURRENT" = "blue" ]; then
              PREV="green"; PREV_PORT="8001"; CURR_PORT="8000"
            else
              PREV="blue"; PREV_PORT="8000"; CURR_PORT="8001"
            fi
            echo "Rolling back from $CURRENT to $PREV"

            # Restart previous slot
            docker compose -f docker-compose.prod.yml -p femvelle_$PREV start django

            # Health check previous slot
            for i in $(seq 1 6); do
              if curl -sf http://localhost:$PREV_PORT/health/ > /dev/null; then
                break
              fi
              sleep 5
            done

            # Cut nginx back
            sed -i "s/proxy_pass http:\/\/django:$CURR_PORT/proxy_pass http:\/\/django:$PREV_PORT/" \
              /opt/femvelle/nginx/sites-enabled/femvelle.conf
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            echo "$PREV" > /opt/femvelle/.current_slot
            echo "✅ Rolled back to $PREV"
