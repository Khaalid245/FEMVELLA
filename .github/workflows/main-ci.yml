name: Main CI

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Full Test Suite + Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: femvelle_test
          MYSQL_USER: femvelle
          MYSQL_PASSWORD: femvelle
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements/test.txt black isort flake8

      - name: Black check
        working-directory: backend
        run: black --check --line-length=100 .

      - name: isort check
        working-directory: backend
        run: isort --check-only --profile=black --line-length=100 .

      - name: Flake8
        working-directory: backend
        run: flake8 .

      - name: Django tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-secret-key-for-testing-only-minimum-fifty-chars
          ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          DATABASE_URL: mysql://femvelle:femvelle@127.0.0.1:3306/femvelle_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=apps --cov-report=xml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Prettier check
        working-directory: frontend
        run: npx prettier --check src

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: React tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
