services:
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - femvelle

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      - django
      - redis
    networks:
      - femvelle

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-femvelle}
      MYSQL_USER: ${MYSQL_USER:-femvelle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-femvelle}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - femvelle

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - femvelle

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - django
    networks:
      - femvelle

volumes:
  mysql_data:

networks:
  femvelle:
    driver: bridge
