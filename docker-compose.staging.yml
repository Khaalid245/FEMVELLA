version: "3.8"

# Staging environment — mirrors production with staging-specific overrides.
# Deploy with: docker compose -f docker-compose.staging.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.staging
  DATABASE_URL: mysql://femvelle:${DB_PASSWORD}@mysql:3306/femvelle_staging
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  SECRET_KEY: ${SECRET_KEY}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_STORAGE_BUCKET_NAME: femvelle-staging
  SENTRY_DSN: ${SENTRY_DSN}
  RELEASE_VERSION: ${RELEASE_VERSION:-staging}

services:
  nginx:
    image: nginx:alpine
    container_name: femvelle_staging_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled/staging.conf:/etc/nginx/sites-enabled/femvelle.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on: [django, frontend]
    networks: [femvelle_staging]
    restart: unless-stopped
    logging: *default-logging

  django:
    image: ${REGISTRY}/femvelle-backend:${IMAGE_TAG:-staging}
    container_name: femvelle_staging_django
    environment:
      <<: *django-env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [femvelle_staging]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  frontend:
    image: ${REGISTRY}/femvelle-frontend:${IMAGE_TAG:-staging}
    container_name: femvelle_staging_frontend
    environment:
      - VITE_API_BASE_URL=https://api.staging.femvelle.com
      - VITE_STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY_TEST}
      - VITE_SENTRY_DSN=${FRONTEND_SENTRY_DSN}
      - VITE_ENVIRONMENT=staging
    networks: [femvelle_staging]
    restart: unless-stopped
    logging: *default-logging

  celery:
    image: ${REGISTRY}/femvelle-backend:${IMAGE_TAG:-staging}
    container_name: femvelle_staging_celery
    command: celery -A config worker -l info --concurrency=2
    environment:
      <<: *django-env
    volumes: [./logs:/app/logs]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [femvelle_staging]
    restart: unless-stopped
    logging: *default-logging

  mysql:
    image: mysql:8.0
    container_name: femvelle_staging_mysql
    environment:
      - MYSQL_DATABASE=femvelle_staging
      - MYSQL_USER=femvelle
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - mysql_staging_data:/var/lib/mysql
    networks: [femvelle_staging]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: femvelle_staging_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes: [redis_staging_data:/data]
    networks: [femvelle_staging]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

volumes:
  mysql_staging_data:
  redis_staging_data:
  static_volume:
  media_volume:

networks:
  femvelle_staging:
    driver: bridge
