<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #2C2420;
            background-color: #FEFCF8;
        }
        
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFFFFF;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background: linear-gradient(135deg, #2C2420 0%, #3D3530 100%);
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            color: #FFFFFF;
            text-decoration: none;
            letter-spacing: 2px;
        }
        
        .tagline {
            color: #C4985A;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        
        .content {
            padding: 40px 30px;
        }
        
        .greeting {
            font-size: 18px;
            margin-bottom: 20px;
            color: #2C2420;
        }
        
        .message {
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #4A4A4A;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #C4985A 0%, #D4A574 100%);
            color: #FFFFFF;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 152, 90, 0.3);
        }
        
        .order-details {
            background-color: #FEFCF8;
            border: 1px solid #E5E5E5;
            border-radius: 8px;
            padding: 25px;
            margin: 25px 0;
        }
        
        .order-header {
            font-size: 18px;
            font-weight: 600;
            color: #2C2420;
            margin-bottom: 15px;
            border-bottom: 2px solid #C4985A;
            padding-bottom: 10px;
        }
        
        .order-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .order-label {
            font-weight: 600;
            color: #2C2420;
        }
        
        .order-value {
            color: #4A4A4A;
        }
        
        .total-row {
            border-top: 2px solid #E5E5E5;
            padding-top: 15px;
            margin-top: 15px;
        }
        
        .total-row .order-value {
            font-weight: 700;
            font-size: 18px;
            color: #2C2420;
        }
        
        .address-section {
            background-color: #F8F9FA;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .address-title {
            font-weight: 600;
            color: #2C2420;
            margin-bottom: 10px;
        }
        
        .address-text {
            color: #4A4A4A;
            line-height: 1.5;
        }
        
        .footer {
            background-color: #2C2420;
            color: #FFFFFF;
            padding: 30px;
            text-align: center;
        }
        
        .footer-links {
            margin-bottom: 20px;
        }
        
        .footer-link {
            color: #C4985A;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }
        
        .footer-link:hover {
            color: #FFFFFF;
        }
        
        .social-links {
            margin: 20px 0;
        }
        
        .social-link {
            display: inline-block;
            margin: 0 10px;
            color: #C4985A;
            text-decoration: none;
        }
        
        .copyright {
            font-size: 12px;
            color: #8A8A8A;
            margin-top: 20px;
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(90deg, #C4985A 0%, #D4A574 100%);
            margin: 30px 0;
            border: none;
        }
        
        @media (max-width: 600px) {
            .email-container {
                margin: 0;
                box-shadow: none;
            }
            
            .header, .content, .footer {
                padding: 20px;
            }
            
            .logo {
                font-size: 28px;
            }
            
            .order-info {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="header">
            <a href="{{ site_url }}" class="logo">FEMVELLE</a>
            <div class="tagline">MODEST LUXURY FASHION</div>
        </div>
        
        <!-- Content -->
        <div class="content">
            {{ content|safe }}
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-links">
                <a href="{{ site_url }}" class="footer-link">Shop</a>
                <a href="{{ site_url }}/about" class="footer-link">About</a>
                <a href="{{ site_url }}/contact" class="footer-link">Contact</a>
                <a href="{{ site_url }}/help" class="footer-link">Help</a>
            </div>
            
            <div class="social-links">
                <a href="#" class="social-link">Instagram</a>
                <a href="#" class="social-link">Facebook</a>
                <a href="#" class="social-link">Twitter</a>
            </div>
            
            <div class="copyright">
                © 2024 Femvelle. All rights reserved.<br>
                Questions? Contact us at <a href="mailto:{{ support_email }}" style="color: #C4985A;">{{ support_email }}</a>
            </div>
        </div>
    </div>
</body>
</html>
