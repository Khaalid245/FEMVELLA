# Standalone observability stack.
# Usage (overlay on staging):
#   docker compose -f docker-compose.staging.yml -f docker-compose.monitoring.yml up -d
# Usage (standalone against an existing network):
#   MONITORING_NETWORK=femvelle_staging docker compose -f docker-compose.monitoring.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: femvelle_prometheus
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./monitoring/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.3.3
    container_name: femvelle_grafana
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${EMAIL_HOST}:587
      - GF_SMTP_USER=${EMAIL_HOST_USER}
      - GF_SMTP_PASSWORD=${EMAIL_HOST_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=grafana@femvelle.com
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki]
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  loki:
    image: grafana/loki:2.9.4
    container_name: femvelle_loki
    ports: ["3100:3100"]
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  promtail:
    image: grafana/promtail:2.9.4
    container_name: femvelle_promtail
    volumes:
      - ./monitoring/loki/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/var/log/femvelle:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  alertmanager:
    build:
      context: ./monitoring/alertmanager
      dockerfile: Dockerfile
    container_name: femvelle_alertmanager
    ports: ["9093:9093"]
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: femvelle_node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: femvelle_blackbox
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: femvelle_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: femvelle_mysql_exporter
    environment:
      - DATA_SOURCE_NAME=exporter:${MYSQL_EXPORTER_PASSWORD}@(mysql:3306)/
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: femvelle_nginx_exporter
    command: --nginx.scrape-uri=http://nginx:8080/stub_status
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.4.1
    container_name: femvelle_tempo
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP API
    networks: [monitoring]
    restart: unless-stopped
    logging: *default-logging

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  tempo_data:

networks:
  monitoring:
    name: ${MONITORING_NETWORK:-femvelle_network}
    external: true
