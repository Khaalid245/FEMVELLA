global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "production"
    project: "femvelle"

rule_files:
  - "/etc/prometheus/alert_rules.yml"
  - "/etc/prometheus/recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── System metrics ──────────────────────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "femvelle-prod"

  # ── Django application metrics ──────────────────────────────────────────
  - job_name: "django"
    static_configs:
      - targets: ["django:8001"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: "django"

  # ── Celery worker metrics ───────────────────────────────────────────────
  - job_name: "celery"
    static_configs:
      - targets: ["django:8002"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ── Nginx metrics (via nginx-prometheus-exporter) ───────────────────────
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
    scrape_interval: 15s

  # ── MySQL metrics ───────────────────────────────────────────────────────
  - job_name: "mysql"
    static_configs:
      - targets: ["mysql-exporter:9104"]
    scrape_interval: 30s

  # ── Redis metrics ───────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # ── Blackbox uptime probes ──────────────────────────────────────────────
  - job_name: "blackbox-http"
    metrics_path: "/probe"
    params:
      module: ["http_2xx"]
    static_configs:
      - targets:
          - "https://femvelle.com"
          - "https://api.femvelle.com/health/"
          - "https://api.femvelle.com/api/products/"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  - job_name: "blackbox-ssl"
    metrics_path: "/probe"
    params:
      module: ["tcp_connect"]
    static_configs:
      - targets:
          - "femvelle.com:443"
          - "api.femvelle.com:443"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"
