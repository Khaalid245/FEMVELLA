apiVersion: 1

providers:
  - name: Femvelle Dashboards
    orgId: 1
    folder: Femvelle
    folderUid: femvelle
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
