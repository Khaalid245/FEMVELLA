server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: femvelle
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # ── Docker container logs ─────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=femvelle"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
    pipeline_stages:
      # Parse JSON logs from Django
      - match:
          selector: '{service="django"}'
          stages:
            - json:
                expressions:
                  level: levelname
                  message: message
                  module: module
            - labels:
                level:
                module:
            - output:
                source: message

      # Parse Nginx access logs
      - match:
          selector: '{service="nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+) (?P<body_bytes_sent>\d+)'
            - labels:
                method:
                status:
            - metrics:
                nginx_request_duration_seconds:
                  type: Histogram
                  description: "Nginx request duration"
                  source: body_bytes_sent
                  config:
                    buckets: [0.1, 0.5, 1, 2, 5]

  # ── Application log files ─────────────────────────────────────────────────
  - job_name: django-files
    static_configs:
      - targets: ["localhost"]
        labels:
          service: django
          __path__: /var/log/femvelle/*.log
    pipeline_stages:
      - json:
          expressions:
            level: levelname
            message: message
      - labels:
          level:
      - output:
          source: message
